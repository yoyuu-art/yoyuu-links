<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEWS | YOYUU</title>
    <meta name="description" content="YOYUU news" />

    <link rel="icon" sizes="32x32" href="img/icon2.jpg">
    <link rel="icon" sizes="16x16" href="img/icon2.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="img/icon2.jpg">



    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --subtext: #666666;
            --line: #e9e9e9;
            --card: #ffffff;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            --max: 760px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family:
                -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI",
                "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .wrap {
            width: min(calc(100% - 24px), var(--max));
            margin: 0 auto;
            padding: 24px 0 56px;
        }

        .page-head {
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 12px;
            color: var(--subtext);
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 7vw, 44px);
            line-height: 1.15;
            font-weight: 700;
            letter-spacing: 0.04em;
            font-family: "Avenir", "Yu Gothic", "Yu Gothic UI", sans-serif;
        }

        .lead {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--subtext);
        }

        .news-list {
            display: grid;
            gap: 14px;
            margin-top: 24px;
        }

        .news-card {
            display: block;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease;
        }

        .news-card:hover,
        .news-card:focus-visible {
            transform: translateY(-1px);
            opacity: 0.9;
            border-color: #dcdcdc;
        }

        .news-date {
            margin: 0 0 6px;
            font-size: 11px;
            color: var(--subtext);
            letter-spacing: 0.06em;
        }

        .news-title {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            font-weight: 650;
        }

        .news-text {
            margin: 6px 0 0;
            font-size: 13px;
            color: var(--subtext);
            line-height: 1.7;
        }

        .empty {
            margin-top: 24px;
            font-size: 13px;
            color: var(--subtext);
        }

        .news-title {
            text-decoration: underline;
            text-decoration-style: dotted;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            text-decoration-color: #ff7a00;
        }

        .news-item:hover .news-title {
            text-decoration-color: #0051ff;
        }

        .news-title::after {
            content: " ↗";
            font-size: 10px;
            color: #fa27e9;
            margin-left: 4px;
        }

        .news-text {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--subtext);
            line-height: 1.6;
        }

        .news-empty {
            margin: 0;
            font-size: 12px;
            color: var(--subtext);
            line-height: 1.6;
        }

        .news-image {
            width: 100%;
            border-radius: 12px;
            margin: 8px 0 6px;
            object-fit: cover;
        }

        .center-image {
            display: flex;
            justify-content: center;
            margin: 24px 0 0;
        }

        .center-image img {
            max-width: 100px;
            /* opacity: 0.8; */
            border: solid 1px W;
        }

        .center-image-2 img {
            animation: floatSide 6s ease-in-out infinite;
        }

        @keyframes floatSide {
            0% {
                transform: translateX(-8px) translateY(0px);
            }

            50% {
                transform: translateX(8px) translateY(-4px);
            }

            100% {
                transform: translateX(-8px) translateY(0px);
            }
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: #888888;
        }
    </style>
</head>

<body>



    <main class="wrap">
        <div class="page-head">
            <a href="index.html" class="back-link">← Back</a>
            <h1>NEWS</h1>
            <p class="lead">お知らせ一覧</p>
        </div>
        <style>
            .wave-line {
                display: flex;
                justify-content: left;
                margin: 0px;
                stroke: rgba(255, 0, 225, 0.7);
            }

            .wave-line svg {
                width: 500px;
                max-width: 60%;
                height: 40px;

            }

            .wave-line svg {
                animation: waveMove 6s ease-in-out infinite;
            }

            @keyframes waveMove {
                0% {
                    transform: translateX(0);
                }

                50% {
                    transform: translateX(10px);
                }

                100% {
                    transform: translateX(0);
                }
            }
        </style>
        <div class="wave-line">
            <svg viewBox="0 0 500 40">
                <path d="M0 20 Q25 0 50 20 T100 20 T150 20 T200 20 T250 20 T300 20 T350 20 T400 20 T450 20 T500 20"
                    fill="none" stroke-width="11" stroke-linecap="round" />
            </svg>
        </div>

        <div id="news-list" class="news-list">
            <p class="empty">Loading...</p>
        </div>
        <div class="center-image center-image-2">
            <img src="img/001 (2).png" alt="">
        </div>

        <footer class="footer">
            © YOYUU
        </footer>

    </main>


    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1RYo2Wf_bozF6laFHHtNEdJCZnl5IWYRMdZYqeSY6tXM/export?format=csv&gid=0";

        function parseCSVLine(line) {
            const result = [];
            let current = "";
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const next = line[i + 1];

                if (char === '"' && inQuotes && next === '"') {
                    current += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === "," && !inQuotes) {
                    result.push(current);
                    current = "";
                } else {
                    current += char;
                }
            }

            result.push(current);
            return result;
        }

        function csvToObjects(csvText) {
            const lines = csvText.trim().split(/\r?\n/);
            if (lines.length < 2) return [];

            const headers = parseCSVLine(lines[0]).map(h => h.trim());

            return lines.slice(1).map(line => {
                const values = parseCSVLine(line);
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = (values[index] || "").trim();
                });
                return obj;
            });
        }

        fetch(SHEET_CSV_URL)
            .then(response => response.text())
            .then(csvText => {
                const items = csvToObjects(csvText);
                const newsList = document.getElementById("news-list");

                const visibleItems = items.filter(item =>
                    item.date || item.title || item.text || item.url || item.image
                );

                if (!visibleItems.length) {
                    newsList.innerHTML = `<p class="empty">No updates yet.</p>`;
                    return;
                }

                newsList.innerHTML = visibleItems.map(item => {
                    const date = item.date || "";
                    const title = item.title || "";
                    const text = item.text || "";
                    const url = (item.url || "").trim();

                    const rawImage = (item.image || "").trim();

                    const image = rawImage
                        ? (rawImage.startsWith("http")
                            ? rawImage
                            : `https://yoyuu-art.pages.dev/${rawImage.replace(/^\/+/, "")}`)
                        : "";

                    const imageHtml = image
                        ? `<img class="news-image" src="${image}" alt="${title}">`
                        : "";

                    const content = `
                <p class="news-date">${date}</p>
                <p class="news-title">${title}</p>
                ${imageHtml}
                <p class="news-text">${text}</p>
            `;

                    if (url) {
                        return `
                    <a class="news-card" href="${url}" target="_blank" rel="noopener noreferrer">
                        ${content}
                    </a>
                `;
                    }

                    return `
                <div class="news-card">
                    ${content}
                </div>
            `;
                }).join("");
            })
            .catch(() => {
                document.getElementById("news-list").innerHTML =
                    `<p class="empty">Failed to load updates.</p>`;
            });
    </script>

</body>

</html>
